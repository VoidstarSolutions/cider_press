[package]
name = "cider-press"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Cold-pressed LLM inference for Apple Silicon."
license = "MIT"
repository = "https://github.com/zheylmun/cider-press"
readme = "README.md"
keywords = ["llm", "inference", "apple-silicon", "metal", "mlx"]
categories = ["science"]

[lib]

[features]
default = []

[dependencies]

[target.'cfg(target_os = "macos")'.dependencies]

[dev-dependencies]

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
unreachable_pub = "warn"
rust_2024_compatibility = { level = "warn", priority = -1 }

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
# Project-specific allows. Revisit as the codebase grows.
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

