name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        task: [fmt, clippy, test, doc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pinned in rust-toolchain.toml; this just installs the components.
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          # Bust the cache when MLX vendoring changes — build.rs output
          # depends on every file in kernels-mlx/.
          shared-key: ${{ hashFiles('kernels-mlx/**', 'Cargo.lock') }}

      # The binary-op parity test shells out to
      # `uv run scripts/dump_mlx_op.py` to generate MLX reference
      # fixtures at test time (see crates/cider-press-kernels/tests/
      # binary_parity.rs). Only the `test` job needs it, but installing
      # it unconditionally keeps the matrix steps symmetric and is
      # cheap (the action's own cache handles repeat runs).
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: cargo fmt --check
        if: matrix.task == 'fmt'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        if: matrix.task == 'test'
        run: cargo test --workspace --release

      - name: cargo doc
        if: matrix.task == 'doc'
        run: cargo doc --workspace --no-deps --all-features
